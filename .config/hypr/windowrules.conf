# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

windowrulev2 = opacity 1 0.85,class:^(firefox)$
windowrulev2 = opacity 1 0.85,class:^(Steam)$
windowrulev2 = opacity 1 0.85,class:^(steam)$
windowrulev2 = opacity 1 0.85,class:^(rofi)$
windowrulev2 = opacity 1 0.85,class:^(steamwebhelper)$
windowrulev2 = opacity 1 0.85,class:^(kitty)$

windowrulev2 = opacity 1 0.85,class:^(hu.kramo.Cartridges)$ #Cartridges-Gtk
windowrulev2 = opacity 1 0.85,class:^(com.obsproject.Studio)$ #Obs-Qt
windowrulev2 = opacity 1 0.85,class:^(vesktop)$ #Discord-Electron

windowrulev2 = opacity 1 0.85,class:^(pavucontrol)$
windowrulev2 = opacity 1 0.85,class:^(nm-applet)$
windowrulev2 = opacity 1 0.85,class:^(nm-connection-editor)$
windowrulev2 = opacity 1 0.85,class:^(org.kde.polkit-kde-authentication-agent-1)$

windowrulev2 = float,class:^(pavucontrol)$
windowrulev2 = float,class:^(nm-applet)$
windowrulev2 = float,class:^(nm-connection-editor)$
windowrulev2 = float,class:^(org.kde.polkit-kde-authentication-agent-1)$

windowrulev2 = opacity 0.0 override 0.0 override,class:^(xwaylandvideobridge)$
windowrulev2 = noanim,class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus,class:^(xwaylandvideobridge)$
windowrulev2 = maxsize 1 1,class:^(xwaylandvideobridge)$
windowrulev2 = noblur,class:^(xwaylandvideobridge)$
